<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jimothy Christmas</title>
    <link rel="icon" type="image/png" href="jimothy-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <span class="brand">
        <img class="brand__mark" src="jimothy-logo.png" alt="Jimothy logo" />
        <span class="brand__word">Jimothy Christmas</span>
      </span>
    </header>

    <main class="hero">
      <p class="eyebrow">Handmade stained glass ornaments</p>
      <h1 class="hero__title">Ho Ho Ho!<br /><span class="hero__line">It's <span class="accent">Jimothy</span> Christmas!</span></h1>
      <p class="hero__tagline">Coming soon...</p>
      <p id="message" class="hero__message"></p>

      <div class="ornament">
        <img
          src="Jimothy-glass1.png"
          alt="A handmade stained glass Jimothy Christmas ornament"
          class="ornament__img"
        />
      </div>
    </main>

    <footer class="footer">
      <a href="https://sedo.com/search/details/?domain=jimothychristmas.com&origin=domaindetails" target="_blank" rel="noopener noreferrer">
        <button class="pill">Buy JimothyChristmas.com</button>
      </a>
      <a href="https://sedo.com/search/details/?domain=jimothycricket.com&origin=domaindetails" target="_blank" rel="noopener noreferrer">
        <button class="pill">Buy JimothyCricket.com</button>
      </a>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
